name: Build Check

on:
  pull_request:
    branches: [ main, dev ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build SwiftUI App on Available Simulator
        run: |
          # 1. Dynamically find the ID of any available iPhone or iPad simulator
          SIMULATOR_ID=$(xcrun simctl list devices available | grep -E "iPhone|iPad|Air" | grep -v "unavailable" | head -n 1 | awk -F '[()]' '{print $(NF-1)}')
          
          if [ -n "$SIMULATOR_ID" ]; then
            echo "Selected Simulator ID: $SIMULATOR_ID"
            xcodebuild clean build \
              -project "NutriScan/NutriScan.xcodeproj" \
              -scheme "NutriScan" \
              -destination "platform=iOS Simulator,id=$SIMULATOR_ID" \
              CODE_SIGNING_ALLOWED=NO
          else
            echo "No specific device ID found. Falling back to generic simulator."
            xcodebuild clean build \
              -project "NutriScan/NutriScan.xcodeproj" \
              -scheme "NutriScan" \
              -destination "generic/platform=iOS Simulator" \
              CODE_SIGNING_ALLOWED=NO
          fi
